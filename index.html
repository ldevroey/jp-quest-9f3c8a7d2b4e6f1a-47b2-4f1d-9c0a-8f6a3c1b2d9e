<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeu – Code</title>
<style>
html, body { height: 100%; margin: 0; }
:root { --bgimg: url("assets/bg/mosaic_5x5_maxsquare.jpg"); }

body {
  position: relative;
  overflow: hidden;
  background: #000;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  color: #fff;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image: var(--bgimg);
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  filter: blur(10px) grayscale(55%) brightness(0.72);
  transform: scale(1.04);
  z-index: -2;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.18);
  z-index: -1;
}

.fg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.fg img {
  width: 100vw;
  height: 100vh;
  object-fit: contain;
  object-position: center;
  display: block;
}

.ui {
  position: fixed;
  inset: 0;
  display: grid;
  place-items: center;
  z-index: 1;
  padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right))
           max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
}

.panel {
  width: min(520px, 92vw);
  background: rgba(0,0,0,0.35);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 18px;
  padding: 14px 14px;
  text-align: center;
  backdrop-filter: blur(6px);
}

.lock {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
}

.wheel {
  width: clamp(44px, 12vw, 54px);
  height: clamp(64px, 16vw, 78px);
  border-radius: 12px;
  border: 2px solid rgba(255,255,255,0.20);
  background: rgba(10,10,10,0.55);
  font-size: clamp(26px, 7vw, 34px);
  line-height: clamp(64px, 16vw, 78px);
  user-select: none;
  cursor: pointer;
}

.actions {
  margin-top: 10px;
  display: flex;
  justify-content: center;
}

button {
  border: 0;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 14px;
  cursor: pointer;
  background: #c62828;
  color: #fff;
}

#result {
  margin-top: 10px;
  font-weight: 700;
  min-height: 1.2em;
}

.success { color: #4caf50; }
.error { color: #ff5252; }
</style>
</head>
<body>
<div class="fg"><img src="assets/bg/mosaic_5x5_maxsquare.jpg" alt=""></div>
<div class="ui">
  <div class="panel">
    <div class="lock">
      <div class="wheel">0</div>
      <div class="wheel">0</div>
      <div class="wheel">0</div>
      <div class="wheel">0</div>
      <div class="wheel">0</div>
    </div>
    <div class="actions">
      <button id="validate">Valider</button>
    </div>
    <div id="result"></div>
  </div>
</div>
<script>
const CODE = "12345";
const wheels = Array.from(document.querySelectorAll('.wheel'));
const result = document.getElementById('result');

function getValue() {
  return wheels.map(w => w.textContent).join('');
}

function clearResult() {
  result.textContent = "";
  result.className = "";
}

function show(ok) {
  result.textContent = ok ? "Code correct" : "Code incorrect";
  result.className = ok ? "success" : "error";
}

function validate() {
  show(getValue() === CODE);
}

wheels.forEach(w => {
  w.addEventListener('click', () => {
    const v = (parseInt(w.textContent,10) + 1) % 10;
    w.textContent = String(v);
    clearResult();
  });
  w.addEventListener('wheel', e => {
    e.preventDefault();
    const cur = parseInt(w.textContent,10);
    const v = (cur + (e.deltaY < 0 ? 1 : 9)) % 10;
    w.textContent = String(v);
    clearResult();
  }, { passive: false });
});

document.getElementById('validate').addEventListener('click', validate);
</script>
</body>
</html>
