<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeu – Code</title>
<style>
:root { --bgimg: url("assets/bg/mosaic_5x5_maxsquare.jpg"); }

html, body { height: 100%; margin: 0; }

body {
  position: relative;
  overflow: hidden;
  background: #000;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  color: #fff;
}

#stage {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  height: 100dvh;
}

#stage::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: var(--bgimg);
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  filter: blur(4px) grayscale(25%) brightness(0.90);
  transform: scale(1.02);
  z-index: 0;
}

#stage::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.30);
  z-index: 1;
}

.mosaic {
  position: absolute;
  inset: 0;
  z-index: 2;
  pointer-events: none;
}

.mosaic img {
  width: 100vw;
  height: 100vh;
  height: 100dvh;
  object-fit: contain;
  object-position: center;
  display: block;
}

.panel {
  position: fixed;
  left: var(--cx, 50vw);
  top: var(--cy, 50vh);
  transform: translate(-50%, -50%);
  z-index: 3;

  width: min(520px, 92vw);
  background: rgba(0,0,0,0.26);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 14px;
  padding: 8px 8px;
  text-align: center;
  backdrop-filter: blur(4px);
}

.lock {
  display: flex;
  justify-content: center;
  gap: 6px;
  flex-wrap: wrap;
  margin: 0;
}

.wheel {
  width: clamp(44px, 12vw, 54px);
  height: clamp(62px, 16vw, 74px);
  border-radius: 12px;
  border: 2px solid rgba(255,255,255,0.20);
  background: rgba(10,10,10,0.46);
  font-size: clamp(26px, 7vw, 34px);
  line-height: clamp(62px, 16vw, 74px);
  user-select: none;
  cursor: pointer;
}

.actions {
  margin-top: 6px;
  display: flex;
  justify-content: center;
}

button {
  border: 0;
  border-radius: 10px;
  padding: 9px 14px;
  font-size: 14px;
  cursor: pointer;
  background: #c62828;
  color: #fff;
}

#result {
  margin-top: 6px;
  font-weight: 700;
  min-height: 1.2em;
}

.success { color: #4caf50; }
.error { color: #ff5252; }

.hidden { display: none; }

.success-page {
  padding: 14px 12px;
  font-size: 18px;
  line-height: 1.35;
}
</style>
</head>
<body>
<div id="stage">
  <div class="mosaic"><img id="mosaicImg" src="assets/bg/mosaic_5x5_maxsquare.jpg" alt=""></div>
</div>

<div class="panel" id="panel">
  <div id="codeScreen">
    <div class="lock">
      <div class="wheel">0</div>
      <div class="wheel">0</div>
      <div class="wheel">0</div>
      <div class="wheel">0</div>
      <div class="wheel">0</div>
    </div>
    <div class="actions">
      <button id="validate">Valider</button>
    </div>
    <div id="result"></div>
  </div>
  <div id="successScreen" class="hidden success-page">BRAVO Robin et Mathis, vous avez parfaitement réalisé votre mission au Japon ! Nous espérons qu'elle vous a plu, et nous vous offrons à chacun VOTRE album photo des vacances pour garder un maginifique souvenir de ce beau voyage :-) Maman & Papa</div>
</div>

<script>
const CODE = "18916";
const wheels = Array.from(document.querySelectorAll('.wheel'));
const result = document.getElementById('result');
const codeScreen = document.getElementById('codeScreen');
const successScreen = document.getElementById('successScreen');
const img = document.getElementById('mosaicImg');

function getValue() {
  return wheels.map(w => w.textContent).join('');
}

function clearResult() {
  result.textContent = "";
  result.className = "";
}

function showError() {
  result.textContent = "Code incorrect";
  result.className = "error";
}

function showSuccessPage() {
  codeScreen.classList.add('hidden');
  successScreen.classList.remove('hidden');
}

function validate() {
  if (getValue() === CODE) {
    showSuccessPage();
  } else {
    showError();
  }
}

wheels.forEach(w => {
  w.addEventListener('click', () => {
    w.textContent = String((parseInt(w.textContent,10) + 1) % 10);
    clearResult();
  });
  w.addEventListener('wheel', e => {
    e.preventDefault();
    const cur = parseInt(w.textContent,10);
    w.textContent = String((cur + (e.deltaY < 0 ? 1 : 9)) % 10);
    clearResult();
  }, { passive: false });
});

document.getElementById('validate').addEventListener('click', validate);

function placePanel() {
  const vw = window.innerWidth;
  const vh = (window.visualViewport && window.visualViewport.height) ? window.visualViewport.height : window.innerHeight;

  const iw = img.naturalWidth || 1;
  const ih = img.naturalHeight || 1;

  const scale = Math.min(vw / iw, vh / ih);
  const rw = iw * scale;
  const rh = ih * scale;

  const ox = (vw - rw) / 2;
  const oy = (vh - rh) / 2;

  const cx = ox + rw / 2;
  const cy = oy + rh / 2;

  document.documentElement.style.setProperty('--cx', cx + 'px');
  document.documentElement.style.setProperty('--cy', cy + 'px');
}

function schedulePlace() {
  requestAnimationFrame(placePanel);
}

img.addEventListener('load', schedulePlace);
window.addEventListener('resize', schedulePlace);
if (window.visualViewport) window.visualViewport.addEventListener('resize', schedulePlace);
</script>
</body>
</html>
