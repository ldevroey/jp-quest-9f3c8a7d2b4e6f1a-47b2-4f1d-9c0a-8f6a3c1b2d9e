<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeu – Étape</title>
<style>
html, body { height: 100%; margin: 0; }
:root { --bgimg: url("assets/bg/mosaic_4x4_maxsquare.jpg"); }

body {
  position: relative;
  overflow: hidden;
  background: #000;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  color: #fff;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image: var(--bgimg);
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  filter: blur(10px) grayscale(55%) brightness(0.72);
  transform: scale(1.04);
  z-index: -2;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.18);
  z-index: -1;
}

.fg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.fg img {
  width: 100vw;
  height: 100vh;
  object-fit: contain;
  object-position: center;
  display: block;
}

.ui {
  position: relative;
  min-height: 100%;
  display: grid;
  place-items: center;
  z-index: 1;
  padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right))
           max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
}

.panel {
  width: min(520px, 92vw);
  max-height: 92vh;
  overflow: auto;
  background: rgba(0,0,0,0.45);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 18px;
  padding: 22px 20px;
  text-align: center;
  backdrop-filter: blur(6px);
}

h1 { margin: 0 0 10px 0; font-size: 22px; font-weight: 700; }
.p { margin: 6px 0; font-size: 14px; opacity: 0.92; line-height: 1.35; }

.lock {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
  margin: 16px 0 12px 0;
}

.wheel {
  width: clamp(44px, 12vw, 54px);
  height: clamp(64px, 16vw, 78px);
  border-radius: 12px;
  border: 2px solid rgba(255,255,255,0.20);
  background: rgba(10,10,10,0.65);
  font-size: clamp(26px, 7vw, 34px);
  line-height: clamp(64px, 16vw, 78px);
  user-select: none;
  cursor: pointer;
}

.actions {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 8px;
}

button {
  border: 0;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 14px;
  cursor: pointer;
}

.primary { background: #c62828; color: #fff; }
.secondary { background: rgba(255,255,255,0.10); color: #fff; border: 1px solid rgba(255,255,255,0.18); }

#result { margin-top: 12px; font-weight: 700; min-height: 1.2em; }
.success { color: #4caf50; }
.error { color: #ff5252; }
.hint { margin-top: 10px; font-size: 12px; opacity: 0.75; }

.hidden-input { position: absolute; left: -9999px; width: 1px; height: 1px; opacity: 0; }
</style>
</head>
<body>
<div class="fg"><img src="assets/bg/mosaic_4x4_maxsquare.jpg" alt=""></div>
<div class="ui">
  <div class="panel">
    <h1>Bravo</h1>
    <div class="p">Vous êtes arrivés à l’avant-dernière étape du jeu</div>
    <div class="p">Entrez le code secret pour continuer</div>

    <input class="hidden-input" id="kbd" inputmode="numeric" pattern="[0-9]*" maxlength="5" autocomplete="one-time-code">

    <div class="lock" id="lock">
      <div class="wheel">0</div>
      <div class="wheel">0</div>
      <div class="wheel">0</div>
      <div class="wheel">0</div>
      <div class="wheel">0</div>
    </div>

    <div class="actions">
      <button class="primary" id="validate">Valider</button>
      <button class="secondary" id="reset">Réinitialiser</button>
    </div>

    <div id="result"></div>
    <div class="hint">Cliquer sur une roue pour incrémenter. Molette pour décrémenter. Saisie clavier possible.</div>
  </div>
</div>
<script>
const CODE = "12345";
const wheels = Array.from(document.querySelectorAll('.wheel'));
const result = document.getElementById('result');
const kbd = document.getElementById('kbd');

function getValue() {
  return wheels.map(w => w.textContent).join('');
}

function setValue(s) {
  const v = (s || "").replace(/\D/g,'').slice(0,5).padEnd(5,'0');
  for (let i=0;i<5;i++) wheels[i].textContent = v[i];
}

function clearResult() {
  result.textContent = "";
  result.className = "";
}

function show(ok) {
  result.textContent = ok ? "Code correct" : "Code incorrect";
  result.className = ok ? "success" : "error";
}

function validate() {
  show(getValue() === CODE);
}

wheels.forEach(w => {
  w.addEventListener('click', () => {
    const v = (parseInt(w.textContent,10) + 1) % 10;
    w.textContent = String(v);
    clearResult();
  });
  w.addEventListener('wheel', e => {
    e.preventDefault();
    const cur = parseInt(w.textContent,10);
    const v = (cur + (e.deltaY < 0 ? 1 : 9)) % 10;
    w.textContent = String(v);
    clearResult();
  }, { passive: false });
});

document.getElementById('validate').addEventListener('click', validate);

document.getElementById('reset').addEventListener('click', () => {
  setValue('00000');
  clearResult();
});

document.getElementById('lock').addEventListener('click', () => kbd.focus());

kbd.addEventListener('input', () => {
  setValue(kbd.value);
  clearResult();
});
</script>
</body>
</html>
